<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore | Hole in the Wall</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body>
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html">
        <img src="assets/images/logo.png" alt="Hole in the Wall logo">
        <span>Hole in the Wall</span>
      </a>
      <nav class="nav-links">
        <a href="about.html">About</a>
        <a href="explore.html">Explore</a>
        <a id="student-dashboard-link" href="customer.html" style="display:none;">My deals</a>
        <a id="restaurant-portal-link" href="portal.html" style="display:none;">Restaurant Portal</a>
        <a id="profile-link" href="profile.html" class="profile-icon" style="display:none;" title="My profile"
          aria-label="My profile">👤</a>
        <a id="sign-in-link" href="login.html" class="btn btn-primary">Sign In</a>
      </nav>
    </div>
  </header>

  <main class="explore-main">
    <div class="split-layout">
      <section class="results-panel panel">
        <h1>Explore nearby places</h1>
        <div class="search-box">
          <input type="text" placeholder="Search by campus, street, or restaurant name">
          <select id="category-filter">
            <option>All</option>
            <option>Bakery</option>
            <option>Cafe</option>
            <option>Late Night</option>
          </select>
          <button class="btn btn-primary">Search</button>
        </div>
        <div class="filter-row">
          <button class="filter-chip chip-program chip-deals" data-filter-group="program" data-filter-value="deals"
            type="button">Deals</button>
          <button class="filter-chip chip-program chip-catering" data-filter-group="program"
            data-filter-value="catering" type="button">Catering</button>
          <button class="filter-chip chip-program chip-fundraising" data-filter-group="program"
            data-filter-value="fundraising" type="button">Fundraising</button>
          <button class="filter-chip chip-subtype chip-meals" data-filter-group="subtype" data-filter-value="meals"
            type="button">Meals</button>
          <button class="filter-chip chip-subtype chip-drinks" data-filter-group="subtype" data-filter-value="drinks"
            type="button">Drinks</button>
          <button class="filter-chip chip-subtype chip-dessert" data-filter-group="subtype" data-filter-value="dessert"
            type="button">Dessert</button>
        </div>
        <div id="results-list"></div>
      </section>

      <section class="map-panel" id="map"></section>
    </div>
  </main>

  <script src="assets/js/app.js?v=2"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="assets/js/explore.js?v=4"></script>
</body>

</html>
