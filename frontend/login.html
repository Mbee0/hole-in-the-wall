<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | Hole in the Wall</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html">
        <img src="assets/images/logo.png" alt="Hole in the Wall logo">
        <span>Hole in the Wall</span>
      </a>
      <nav class="nav-links">
        <a href="about.html">About</a>
        <a href="explore.html">Explore</a>
        <a href="login.html" class="btn btn-primary">Sign In</a>
      </nav>
    </div>
  </header>

  <main class="auth-wrap container">
    <div class="auth-card">
      <h1>Log in</h1>
      <p class="helper">Use your email and password to access your dashboard.</p>

      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="name@example.edu" required>

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Your password" required>

        <div class="cta-row">
          <button class="btn btn-primary" type="submit">Log in</button>
          <a href="signup.html" class="btn btn-secondary">Create an account</a>
        </div>
      </form>

      <p id="auth-message" class="helper"></p>
    </div>
  </main>

  <script src="assets/js/login.js"></script>
</body>
</html>
