<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Inquiry | Hole in the Wall</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html">
        <img src="assets/images/logo.png" alt="Hole in the Wall logo">
        <span>Hole in the Wall</span>
      </a>
      <nav class="nav-links">
        <a href="about.html">About</a>
        <a href="explore.html">Explore</a>
        <a href="login.html" class="btn btn-primary">Sign In</a>
      </nav>
    </div>
  </header>

  <main class="auth-wrap container">
    <div class="auth-card">
      <h1>Business inquiry</h1>
      <p class="helper">Submit your information. After approval, you’ll receive an onboarding code by email.</p>

      <form id="business-inquiry-form">
        <label for="biz-email">Business email</label>
        <input id="biz-email" type="email" placeholder="owner@business.com" required>

        <label for="biz-phone">Phone number</label>
        <input id="biz-phone" type="text" placeholder="(555) 555-5555" required>

        <label for="inquirer-name">Your name</label>
        <input id="inquirer-name" type="text" placeholder="Your full name" required>

        <label for="business-name">Business name</label>
        <input id="business-name" type="text" placeholder="Maple Crumb Bakery" required>

        <label>Deal types offered to students</label>
        <div class="checkbox-row">
          <label><input type="checkbox" class="deal-type" value="Student Deals"> Student Deals</label>
          <label><input type="checkbox" class="deal-type" value="Catering"> Catering</label>
          <label><input type="checkbox" class="deal-type" value="Fundraiser-friendly"> Fundraiser-friendly</label>
        </div>

        <label for="biz-blurb">Business blurb</label>
        <textarea id="biz-blurb" placeholder="Tell students what makes your place special..."></textarea>

        <div class="cta-row">
          <button class="btn btn-primary" type="submit">Submit inquiry</button>
          <a class="btn btn-secondary" href="business-onboarding.html" style="text-decoration:none;">I received a code</a>
        </div>
      </form>

      <p id="auth-message" class="helper"></p>
    </div>
  </main>

  <script src="assets/js/business-inquiry.js"></script>
</body>
</html>
