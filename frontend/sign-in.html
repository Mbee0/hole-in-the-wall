<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    (function () {
      var h = location.hostname;
      if (h !== 'localhost' && h !== '127.0.0.1') {
        window.APP_API_BASE_OVERRIDE = 'https://hole-in-the-wall.onrender.com/api';
      }
    })();
  </script>

  <title>Sign In | Hole in the Wall</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html">
        <img src="assets/images/logo.png" alt="Hole in the Wall logo">
        <span>Hole in the Wall</span>
      </a>
      <nav class="nav-links">
        <a href="about.html">About</a>
        <a href="explore.html">Explore</a>
      </nav>
    </div>
  </header>

  <main class="auth-wrap container">
    <div class="auth-card">
      <h1>Welcome</h1>
      <p class="helper">Choose what you want to do. You can still browse About and Explore without signing in.</p>

      <div class="cta-row" style="justify-content: flex-start; gap: 12px;">
        <a class="btn btn-primary" href="login.html">Sign in</a>
        <a class="btn btn-secondary" href="signup.html">Create an account</a>
      </div>
    </div>
  </main>
</body>

</html>
