<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Hole in the Wall</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html">
        <img src="assets/images/logo.png" alt="Hole in the Wall logo">
        <span>Hole in the Wall</span>
      </a>
      <nav class="nav-links">
        <a href="about.html">About</a>
        <a href="explore.html">Explore</a>
      </nav>
    </div>
  </header>

  <main class="auth-wrap container">
    <div class="auth-card">
      <h1>Sign in or get started</h1>
      <p class="helper">For now this uses a simple starter registration flow connected to the Flask backend.</p>
      <form id="auth-form">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="name@example.edu" required>

        <label for="role">I am using this as</label>
        <select id="role">
          <option value="consumer">Consumer / Student</option>
          <option value="producer">Restaurant / Food business</option>
          <option value="school">School / Student org</option>
        </select>

        <div class="cta-row">
          <button class="btn btn-primary" type="submit">Create account</button>
          <a href="explore.html" class="btn btn-secondary">Continue as guest</a>
        </div>
      </form>
      <p id="auth-message" class="helper"></p>
    </div>
  </main>

  <script src="assets/js/auth.js"></script>
</body>
</html>
