<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Details | Hole in the Wall</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html">
        <img src="assets/images/logo.png" alt="Hole in the Wall logo">
        <span>Hole in the Wall</span>
      </a>
      <nav class="nav-links">
        <a href="about.html">About</a>
        <a href="explore.html">Explore</a>
        <a href="customer.html">My Deals</a>
        <a href="portal.html" class="btn btn-primary">Restaurant Portal</a>
        <a href="login.html" class="btn btn-primary">Sign In</a>
      </nav>
    </div>
  </header>

  <main class="container section">
    <div class="photo-banner">Feature photo / food gallery area</div>
    <div class="detail-layout section">
      <section class="panel story-box">
        <div id="business-meta" class="meta"></div>
        <h1 id="business-name">Business details</h1>
        <p id="business-story" class="small">Loading business information...</p>

        <h3>Current deals</h3>
        <div id="business-deals"></div>

        <h3>What we offer</h3>
        <div id="business-offers" class="meta"></div>

        <h3>Reviews</h3>
        <p class="small">Starter placeholder for future review system.</p>
      </section>

      <aside class="panel sidebar-box">
        <h3>Business info</h3>
        <p><strong>Address:</strong> <span id="business-address">—</span></p>
        <p><strong>Category:</strong> <span id="business-category">—</span></p>
        <p><strong>Claimed:</strong> <span id="business-claimed">—</span></p>
        <div class="cta-row">
          <button class="btn btn-primary">Save deal</button>
          <button class="btn btn-secondary">Share</button>
        </div>
      </aside>
    </div>
  </main>
  <script src="assets/js/business-detail.js"></script>
</body>

</html>
