<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Onboarding | Hole in the Wall</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html">
        <img src="assets/images/logo.png" alt="Hole in the Wall logo">
        <span>Hole in the Wall</span>
      </a>
      <nav class="nav-links">
        <a href="about.html">About</a>
        <a href="explore.html">Explore</a>
        <a href="login.html" class="btn btn-primary">Sign In</a>
      </nav>
    </div>
  </header>

  <main class="auth-wrap container">
    <div class="auth-card">
      <h1>Business onboarding</h1>
      <p class="helper">Enter the onboarding code you received by email after approval.</p>

      <form id="business-onboarding-form">
        <label for="biz-onboard-email">Business email</label>
        <input id="biz-onboard-email" type="email" placeholder="owner@business.com" required>

        <label for="biz-onboard-code">6-digit code</label>
        <input id="biz-onboard-code" type="text" inputmode="numeric" pattern="^[0-9]{6}$" placeholder="000000" required>

        <label for="biz-onboard-password">Create a password</label>
        <input id="biz-onboard-password" type="password" placeholder="Create a password" required>

        <div class="cta-row">
          <button class="btn btn-primary" type="submit">Create business account</button>
          <a class="btn btn-secondary" href="business-inquiry.html" style="text-decoration:none;">Back to inquiry</a>
        </div>
      </form>

      <p id="auth-message" class="helper"></p>
    </div>
  </main>

  <script src="assets/js/business-onboarding.js"></script>
</body>
</html>
