<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
  (function () {
    var h = location.hostname;
    if (h !== 'localhost' && h !== '127.0.0.1') {
      window.APP_API_BASE_OVERRIDE = 'https://hole-in-the-wall.onrender.com/api';
    }
  })();
  </script>

  <title>Reset Password | Hole in the Wall</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a class="brand" href="index.html">
        <img src="assets/images/logo.png" alt="Hole in the Wall logo">
        <span>Hole in the Wall</span>
      </a>
      <nav class="nav-links">
        <a href="about.html">About</a>
        <a href="explore.html">Explore</a>
        <a href="login.html" class="btn btn-primary">Sign In</a>
      </nav>
    </div>
  </header>

  <main class="auth-wrap container">
    <div class="auth-card">
      <h1>Reset password</h1>
      <p class="helper">Request a reset code and set a new password.</p>

      <form id="reset-form">
        <div id="reset-step-email">
          <label for="reset-email">Email</label>
          <input id="reset-email" type="email" placeholder="name@example.edu" required>

          <div class="cta-row">
            <button id="send-reset-code" class="btn btn-secondary" type="button">Send reset code</button>
          </div>
        </div>

        <div id="reset-send-status" class="status-screen" aria-live="polite">
          <div id="reset-send-icon" class="status-icon sending">...</div>
          <p id="reset-send-text" class="helper">Sending reset code...</p>
        </div>

        <div id="reset-step-confirm" style="display:none;">
          <label for="reset-code">6-digit code</label>
          <input id="reset-code" type="text" inputmode="numeric" pattern="^[0-9]{6}$" placeholder="000000" required>

          <label for="new-password">New password</label>
          <input id="new-password" type="password" placeholder="Create a new password" required>

          <div class="cta-row">
            <button class="btn btn-primary" type="submit">Reset password</button>
            <a class="btn btn-secondary" href="login.html">Back to login</a>
          </div>
        </div>
      </form>

      <p id="reset-message" class="helper"></p>
    </div>
  </main>

  <script src="assets/js/api-config.js?v=1"></script>
  <script src="assets/js/reset-password.js?v=1"></script>
</body>
</html>
